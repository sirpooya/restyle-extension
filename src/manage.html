<!DOCTYPE html>
<html id="stylus" class="normal-layout">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title i18n="styleManager"></title>
  <link rel="icon" href="/icon/128.png">

  <%= htmlWebpackPlugin.tags.headTags %>

  <template data-id="style">
    <div class="entry">
      <h2 class="style-name">
        <a class="style-name-link">
          &nbsp;
          <span class="style-info" data-type="version"></span>
        </a>
        <a target="_blank" class="homepage icon"><i class=i-external></i></a>
      </h2>
      <p class="applies-to">
        <span class="style-info" data-type="age"></span>.
        <label i18n="genericSize">:</label><span class="style-info" data-type="size"></span>.
        <label i18n="appliesDisplay"></label>
        <span class="targets"></span>
      </p>
      <p class="actions">
        <a class="style-edit-link">
          <button i18n="editStyleLabel" tabindex="-1"></button>
        </a>
        <button class="enable" i18n="enableStyleLabel"></button>
        <button class="disable" i18n="disableStyleLabel"></button>
        <button class="delete" i18n="deleteStyleLabel"></button>
        <button class="check-update" i18n="checkForUpdate"></button>
        <button class="update" i18n="installUpdate" hidden></button>
        <button class="configure-usercss" i18n="configureStyle"></button>
        <span class="update-note"></span>
      </p>
    </div>
  </template>

  <template data-id="styleNewUI">
    <div class="entry">
      <i class="drag-handle i-reorder"></i>
      <input type="checkbox" class="slider entry-toggle" i18n="title:toggleStyle">
      <div class="entry-text">
        <h2 class="style-name">
          <img class="entry-favicon" alt="" loading="lazy">
          <a class="style-name-link">
            &nbsp;
            <span class="style-info" data-type="version"></span>
          </a>
          <a target="_blank" class="homepage icon" tabindex="0"><i class=i-external></i></a>
        </h2>
        <div class="applies-to">
          <a class="expander" tabindex="0"><i>▼</i></a>
          <div class="targets"></div>
        </div>
      </div>
      <p class="style-info" data-type="size"></p>
      <p class="style-info" data-type="age"></p>
      <p class="actions">
        <a class="edit" i18n="title:editStyleLabel" tabindex="0">
          <i class=i-edit></i>
        </a>
        <a class="delete" i18n="title:deleteStyleLabel" tabindex="0">
          <i class=i-trash></i>
        </a>
      </p>
    </div>
  </template>

  <template data-id="configureIcon">
    <a class="configure-usercss" i18n="title:configureStyle" tabindex="0">
      <i class=i-config></i>
    </a>
  </template>

  <template data-id="updaterIcons">
    <span class="updater-icons flex">
      <a class="check-update" i18n="title:checkForUpdate" tabindex="0">
        <i class=i-update-check></i>
      </a>
      <a class="update" i18n="title:installUpdate" tabindex="0">
        <i class=i-install></i>
      </a>
      <span class="up-to-date" i18n="title:updateCheckSucceededNoUpdate">
        <i class=i-check1></i>
      </span>
      <span class="updated" i18n="title:updateCompleted">
        <i class=i-check2></i>
      </span>
      <span class="update-note"></span>
    </span>
  </template>

  <template data-id="appliesToTarget">
    <span class="target"></span>
  </template>

  <template data-id="appliesToSeparator">
    <span class="sep">, </span>
  </template>

  <template data-id="appliesToEverything">
    <span class="target" i18n="appliesToEverything"></span>
  </template>

  <template data-id="extraAppliesTo">
    <details class="applies-to-extra">
      <summary class="applies-to-extra-expander" i18n="appliesDisplayTruncatedSuffix"></summary>
    </details>
  </template>

<template data-id="body"><!-- https://crbug.com/1288447 -->

<div id="header" class="dvh100">
  <div id="header-top">
    <h1 i18n="styleManager"></h1>
    <details id="overflow-menu" class="dropdown-menu">
      <summary id="overflow-button" i18n="title:manageMoreActions">
        <i class=i-menu></i>
      </summary>
      <div class="overflow-popup">
        <button id="overflow-options" i18n="title:openOptions">
          <i class=i-config></i>
          <span i18n="optionsHeading"></span>
        </button>
        <button id="check-all-updates" i18n="title:checkAllUpdates">
          <i class=i-update-check></i>
          <span i18n="checkAllUpdates"></span>
          <span id="update-progress"></span>
        </button>
        <button id="update-history-button" i18n="title:genericHistoryLabel">
          <i class=i-log></i>
          <span i18n="genericHistoryLabel"></span>
        </button>
        <button id="injection-order-button" i18n="title:styleInjectionOrder">
          <i class=i-reorder></i>
          <span i18n="styleInjectionOrder"></span>
        </button>
      </div>
    </details>
  </div>

  <label id="disableAll-label" i18n="data-on:disableAllStyles, data-off:disableAllStylesOff">
    <input id="disableAll" type="checkbox">
  </label>

  <div id="manage-settings">
    <div id="stats">
      <span></span>
      <a tabindex="0" i18n="title:genericResetLabel">
        <i class=i-close></i>
      </a>
    </div>

    <div class="settings-column" id="wide-inputs">
      <div id="search-wrapper">
          <input id="search" type="search" i18n="placeholder:search" spellcheck="false"
                 data-filter=":not(.not-matching)"
                 data-filter-hide=".not-matching">
          <!-- search mode is fixed to "all"; the select is kept (hidden) so the
               existing filter JS that reads its value keeps working -->
          <select id="manage.searchMode" hidden>
            <option i18n="searchStylesName" value="name"></option>
            <option i18n="searchStylesMeta" value="meta"></option>
            <option i18n="searchStylesCode" value="code"></option>
            <option i18n="searchStylesMatchUrl" value="url"></option>
            <option i18n="searchStylesAll" value="all" selected></option>
          </select>

          <!-- trailing icon button overlaid inside the search box -->
          <details id="filters-menu" class="dropdown-menu">
            <summary id="filters-button" i18n="title:manageFilters">
              <i class=i-sliders></i>
            </summary>
            <div class="filters-popup">
              <label class="filter-switch">
                <input id="manage.onlyEnabled" type="checkbox" class="slider"
                       data-filter=".enabled"
                       data-filter-hide=".disabled">
                <span i18n="manageOnlyEnabled"></span>
              </label>
              <div class="select-wrapper" hidden>
                <select id="manage.onlyEnabled.invert">
                  <option i18n="manageOnlyEnabled" value="false"></option>
                  <option i18n="manageOnlyDisabled" value="true"></option>
                </select>
              </div>

              <label class="filter-switch">
                <input id="manage.onlyLocal" type="checkbox" class="slider"
                       data-filter=":not(.updatable):not(.update-done)"
                       data-filter-hide=".updatable, .update-done">
                <span i18n="manageOnlyLocal"></span>
              </label>
              <div class="select-wrapper" hidden>
                <select id="manage.onlyLocal.invert" i18n="title:manageOnlyLocalTooltip">
                  <option i18n="manageOnlyLocal" value="false"></option>
                  <option i18n="manageOnlyExternal" value="true"></option>
                </select>
              </div>

              <label class="filter-switch">
                <input id="manage.onlyUsercss" type="checkbox" class="slider"
                       data-filter=".usercss"
                       data-filter-hide=":not(.usercss)">
                <span i18n="manageOnlyUsercss"></span>
              </label>
              <div class="select-wrapper" hidden>
                <select id="manage.onlyUsercss.invert">
                  <option i18n="manageOnlyUsercss" value="false"></option>
                  <option i18n="manageOnlyNonUsercss" value="true"></option>
                </select>
              </div>

              <label class="filter-switch" hidden>
                <input id="only-updates" type="checkbox" class="slider"
                       data-filter=".can-update, .update-problem, .update-done"
                       data-filter-hide=":not(.updatable):not(.update-done),
                                         .no-update:not(.update-problem),
                                         .updatable:not(.can-update):not(.update-problem):not(.update-done)">
                <span i18n="manageOnlyUpdates"></span>
              </label>
            </div>
          </details>
        </div>

      <div id="sort-wrapper">
        <span class="field-label" i18n="sortShortLabel"></span>
        <!-- real select stays in the DOM (hidden) so the existing pref
             sync / sorter.js logic keeps working unmodified -->
        <select id="manage.newUI.sort" hidden></select>
        <details id="sort-menu" class="dropdown-menu" i18n="title:sortLabel">
          <summary id="sort-button"></summary>
          <div class="sort-popup">
            <div id="sort-options"></div>
          </div>
        </details>
      </div>
    </div>

    <div class="settings-column flex" id="actions">
      <main class="flex wrap center-items">
        <button id="manage-options-button" i18n="title:openOptions" class="icon">
          <svg class="hollow-gear" viewBox="0 0 20 20" stroke-width="1.25px">
            <text y="100%">⚙</text>
          </svg>
        </button>

        <a id="add-style" tabindex="-1" href="edit.html" class="icon">
          <button i18n="title:addStyleLabel" class="icon">
            <i class=i-plus></i>
          </button>
        </a>
        <button id="sync-styles" i18n="title:optionsCustomizeSync" class="icon">
          <img hidden>
          <i class=i-cloud></i>
        </button>
        <p id="sync-status"></p>
        <button id="get-styles-button" i18n="linkGetStyles"></button>
        <button id="import" i18n="importLabel"></button>
        <span class="split-btn">
          <button id="export" i18n="exportLabel"></button
          ><button class="split-btn-pedal" i18n="menu-compat:exportCompatible"></button>
        </span>
        <div id="update-all">
          <template data-id="updateAll">
            <button id="apply-all-updates" i18n="applyAllUpdates"></button>
            <span id="update-all-no-updates" i18n="updateAllCheckSucceededNoUpdate"></span>
            <button id="check-all-updates-force" i18n="checkAllUpdatesForce"></button>
          </template>
        </div>
      </main>
    </div>

    <div id="links" hidden>
      <!-- links + backup hint live here (hidden); shown in a modal via the button -->
      <div id="get-styles-content">
        <div class="links-list"><% _.forEach([
          ['userstyles.world/explore', /*i18n*/'linkGetShareStyles'],
          ['uso.kkx.one/browse/styles', /*i18n*/'linkGetStyles'],
          ['github.com/openstyles/stylus/wiki', /*i18n*/'linkGetHelp'],
          ['github.com/openstyles/stylus', , 'GitHub'],
          ['explore.transifex.com/github-7/Stylus/', /*i18n*/'linkTranslate'],
        ], ([url, tl, text]) => { if (tl) { %>
          <a href="https://<%= url %>" target="_blank" class="target" i18n="<%= tl %>"></a>
        <% } else { %>
          <a href="https://<%= url %>" target="_blank" class="target"><%= text %></a>
        <% }}); %>
        </div>
        <p class="backup-hint" i18n="backupReminder"></p>
      </div>
    </div>

  </div>

  <div id="header-resizer" i18n="title:headerResizerHint"></div>
</div>

<div id="installed"></div>

<!-- Bottom action bar: fixed over the list (rows scroll behind it), shown only
     when at least one style exists (hidden via .empty on the root element).
     Buttons forward their clicks to the real sidebar controls — see initBottomBar. -->
<div id="bottom-bar">
  <button id="bottom-write-style" class="icon">
    <i class=i-plus></i>
    <span i18n="addStyleLabel"></span>
  </button>
  <button id="bottom-sync" class="icon">
    <i class=i-cloud></i>
    <span i18n="optionsCustomizeSync"></span>
  </button>
  <button id="bottom-get-styles" i18n="linkGetStyles"></button>
  <button id="bottom-import" i18n="importLabel"></button>
  <button id="bottom-export" i18n="exportLabel"></button>
</div>

<!-- shown only when there are zero styles (see .empty on the root element) -->
<div id="empty-state">
  <h2 i18n="emptyStateTitle"></h2>
  <p i18n="emptyStateSubtitle"></p>
  <div class="flex wrap center-items">
    <button id="empty-import">
      <i class=i-import></i>
      <span i18n="importLabel"></span>
    </button>
    <button id="empty-get-styles">
      <i class=i-external></i>
      <span i18n="linkGetStyles"></span>
    </button>
    <button id="empty-write-style">
      <i class=i-plus></i>
      <span i18n="addStyleLabel"></span>
    </button>
    <button id="empty-sync">
      <i class=i-cloud></i>
      <span i18n="optionsCustomizeSync"></span>
    </button>
  </div>
</div>

</template>
</head>

<body id="stylus-manage" i18n="dragndrop-hint:dragDropMessage">
  <%= htmlWebpackPlugin.tags.bodyTags %>
</body>
</html>
